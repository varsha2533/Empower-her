<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="circle1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#f3d4e4"/>
            <stop offset="100%" style="stop-color:#e4d4f3"/>
        </linearGradient>
        <linearGradient id="circle2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#e4d4f3"/>
            <stop offset="100%" style="stop-color:#d4e5f3"/>
        </linearGradient>
        <linearGradient id="circle3" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#d4e5f3"/>
            <stop offset="100%" style="stop-color:#f3d4e4"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <g transform="translate(400,300)" filter="url(#glow)">
        <!-- Three interlocking circles -->
        <g transform="rotate(0)">
            <circle cx="0" cy="-100" r="80" fill="none" stroke="url(#circle1)" stroke-width="8"/>
            <circle cx="0" cy="-100" r="60" fill="none" stroke="url(#circle1)" stroke-width="4" opacity="0.6"/>
        </g>
        <g transform="rotate(120)">
            <circle cx="0" cy="-100" r="80" fill="none" stroke="url(#circle2)" stroke-width="8"/>
            <circle cx="0" cy="-100" r="60" fill="none" stroke="url(#circle2)" stroke-width="4" opacity="0.6"/>
        </g>
        <g transform="rotate(240)">
            <circle cx="0" cy="-100" r="80" fill="none" stroke="url(#circle3)" stroke-width="8"/>
            <circle cx="0" cy="-100" r="60" fill="none" stroke="url(#circle3)" stroke-width="4" opacity="0.6"/>
        </g>
        
        <!-- Central connecting point -->
        <circle cx="0" cy="0" r="20" fill="#fff" opacity="0.2"/>
        <circle cx="0" cy="0" r="15" fill="#fff" opacity="0.4"/>
        <circle cx="0" cy="0" r="10" fill="#fff" opacity="0.6"/>
    </g>
    
    <!-- Sparkles -->
    <g fill="#fff" filter="url(#glow)">
        <circle cx="300" cy="200" r="2"/>
        <circle cx="500" cy="200" r="2"/>
        <circle cx="400" cy="100" r="2"/>
        <circle cx="300" cy="400" r="2"/>
        <circle cx="500" cy="400" r="2"/>
        <circle cx="400" cy="500" r="2"/>
    </g>
</svg> 