<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#f3d4e4"/>
            <stop offset="100%" style="stop-color:#d4e5f3"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <rect width="100%" height="100%" fill="url(#bg)"/>
    
    <!-- Steps -->
    <g transform="translate(100,450)">
        <rect x="0" y="0" width="600" height="20" fill="#b8c4d9"/>
        <rect x="100" y="-50" width="500" height="20" fill="#b8c4d9"/>
        <rect x="200" y="-100" width="400" height="20" fill="#b8c4d9"/>
        <rect x="300" y="-150" width="300" height="20" fill="#b8c4d9"/>
    </g>
    
    <!-- Women figures -->
    <g filter="url(#glow)">
        <!-- Woman 1 -->
        <circle cx="150" cy="420" r="15" fill="#f3d4e4"/>
        <line x1="150" y1="435" x2="150" y2="470" stroke="#f3d4e4" stroke-width="4"/>
        <line x1="150" y1="445" x2="130" y2="460" stroke="#f3d4e4" stroke-width="4"/>
        <line x1="150" y1="445" x2="170" y2="460" stroke="#f3d4e4" stroke-width="4"/>
        <line x1="150" y1="470" x2="130" y2="490" stroke="#f3d4e4" stroke-width="4"/>
        <line x1="150" y1="470" x2="170" y2="490" stroke="#f3d4e4" stroke-width="4"/>
        
        <!-- Woman 2 -->
        <circle cx="250" cy="370" r="15" fill="#e4d4f3"/>
        <line x1="250" y1="385" x2="250" y2="420" stroke="#e4d4f3" stroke-width="4"/>
        <line x1="250" y1="395" x2="230" y2="410" stroke="#e4d4f3" stroke-width="4"/>
        <line x1="250" y1="395" x2="270" y2="410" stroke="#e4d4f3" stroke-width="4"/>
        <line x1="250" y1="420" x2="230" y2="440" stroke="#e4d4f3" stroke-width="4"/>
        <line x1="250" y1="420" x2="270" y2="440" stroke="#e4d4f3" stroke-width="4"/>
        
        <!-- Woman 3 -->
        <circle cx="350" cy="320" r="15" fill="#d4e5f3"/>
        <line x1="350" y1="335" x2="350" y2="370" stroke="#d4e5f3" stroke-width="4"/>
        <line x1="350" y1="345" x2="330" y2="360" stroke="#d4e5f3" stroke-width="4"/>
        <line x1="350" y1="345" x2="370" y2="360" stroke="#d4e5f3" stroke-width="4"/>
        <line x1="350" y1="370" x2="330" y2="390" stroke="#d4e5f3" stroke-width="4"/>
        <line x1="350" y1="370" x2="370" y2="390" stroke="#d4e5f3" stroke-width="4"/>
    </g>
    
    <!-- Sparkles -->
    <g fill="#fff" filter="url(#glow)">
        <circle cx="200" cy="300" r="2"/>
        <circle cx="300" cy="250" r="2"/>
        <circle cx="400" cy="200" r="2"/>
        <circle cx="150" cy="350" r="2"/>
        <circle cx="250" cy="300" r="2"/>
        <circle cx="350" cy="250" r="2"/>
    </g>
</svg> 